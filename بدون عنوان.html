<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seedran | هوش مصنوعی پیشرفته</title>

    <!-- ===== کتابخانه‌ها ===== -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        /* ===== تنظیمات پایه ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ===== صفحه لودینگ ===== */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a0f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        #loadingScreen.hide {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .loader-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top: 3px solid #667eea;
            border-right: 3px solid #764ba2;
            border-bottom: 3px solid #f093fb;
            animation: spinLoader 1.2s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            position: relative;
        }

        .loader-ring::before {
            content: '✦';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            color: #667eea;
            animation: pulseStar 1.2s ease-in-out infinite;
        }

        @keyframes spinLoader {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulseStar {
            0%,
            100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(0.8);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 2s ease-in-out infinite;
            margin-top: 30px;
            letter-spacing: 4px;
        }

        @keyframes gradientMove {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .loading-dots {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .loading-dots span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #667eea;
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
            background: #764ba2;
        }
        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
            background: #f093fb;
        }

        @keyframes dotBounce {
            0%,
            80%,
            100% {
                transform: scale(0.4);
                opacity: 0.3;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ===== صفحه معرفی ===== */
        #introScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 30% 50%, #1a1a3e 0%, #0a0a0f 70%);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        #introScreen.active {
            display: flex;
            animation: fadeInScale 0.8s ease;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .intro-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
        }

        .intro-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(102, 126, 234, 0.03), transparent, rgba(118, 75, 162, 0.03), transparent);
            animation: rotateBg 20s linear infinite;
        }

        @keyframes rotateBg {
            100% {
                transform: rotate(360deg);
            }
        }

        .intro-icon {
            font-size: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .intro-title {
            font-size: 32px;
            font-weight: 900;
            margin: 20px 0 15px;
            position: relative;
            z-index: 1;
        }

        .intro-desc {
            color: rgba(255, 255, 255, 0.5);
            line-height: 2;
            font-size: 15px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .intro-desc span {
            color: #667eea;
            font-weight: 600;
        }

        .intro-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .btn-glow {
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-glow-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-glow-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.5);
        }

        .btn-glow-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .btn-glow-secondary:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-3px);
        }

        /* ===== صفحه ثبت‌نام/ورود ===== */
        #authScreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 70% 50%, #1a1a3e 0%, #0a0a0f 70%);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9998;
            padding: 20px;
        }

        #authScreen.active {
            display: flex;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 45px 35px;
            max-width: 440px;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(102, 126, 234, 0.05), transparent 60%);
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .auth-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #667eea);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        .auth-typing {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            min-height: 24px;
            margin: 10px 0 25px;
            position: relative;
            z-index: 1;
            direction: ltr;
        }

        .auth-typing span {
            color: #667eea;
        }

        .auth-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            position: relative;
            z-index: 1;
        }

        .auth-input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.08);
        }

        .auth-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.2);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.4);
        }

        .auth-toggle {
            text-align: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
            cursor: pointer;
            transition: color 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .auth-toggle:hover {
            color: #667eea;
        }

        /* ===== دکمه انصراف (بازگشت) ===== */
        .auth-back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .auth-back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: rotate(90deg);
            border-color: rgba(102, 126, 234, 0.3);
        }

        /* ===== صفحه اصلی چت ===== */
        #chatScreen {
            display: none;
            height: 100vh;
            width: 100vw;
            background: #0a0a0f;
            flex-direction: column;
        }

        #chatScreen.active {
            display: flex;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* هدر چت */
        .chat-header {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 100;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }

        .status-dot-online {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #34d399;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .profile-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            flex-shrink: 0;
        }

        .profile-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .profile-btn img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* منوی پروفایل */
        .profile-menu {
            position: absolute;
            top: 70px;
            right: 20px;
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 20px;
            min-width: 240px;
            display: none;
            z-index: 200;
            animation: slideDown 0.3s ease;
        }

        .profile-menu.active {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-menu-item {
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .profile-menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .profile-menu-item.danger {
            color: #ef4444;
        }
        .profile-menu-item.danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* ===== بدنه چت ===== */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 100px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-body::-webkit-scrollbar {
            width: 4px;
        }
        .chat-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 10px;
        }

        /* پیام‌ها */
        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .message.user .message-avatar {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .message.user .message-avatar img,
        .message.ai .message-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.04);
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            border-color: rgba(102, 126, 234, 0.1);
        }

        .message-typing {
            align-self: flex-start;
            display: flex;
            gap: 12px;
            animation: messageIn 0.3s ease;
        }

        .message-typing .message-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* ===== فوتر چت ===== */
        .chat-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 24px 24px;
            background: linear-gradient(to top, #0a0a0f 60%, transparent);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            z-index: 100;
        }

        .chat-input-wrapper {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 4px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .chat-input-wrapper:focus-within {
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.05);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: #fff;
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 120px;
            min-height: 44px;
            font-family: inherit;
            line-height: 1.5;
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .chat-send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
        }

        .chat-send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== کاستوم فایل مخفی برای آپلود عکس ===== */
        #fileInput {
            display: none;
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .intro-card,
            .auth-card {
                padding: 30px 20px;
            }
            .intro-title {
                font-size: 24px;
            }
            .intro-icon {
                font-size: 60px;
            }
            .auth-title {
                font-size: 28px;
            }
            .chat-body {
                padding: 16px 16px 100px;
            }
            .message {
                max-width: 92%;
            }
            .profile-menu {
                right: 10px;
                left: 10px;
                min-width: unset;
            }
            .chat-header {
                padding: 12px 16px;
            }
            .chat-footer {
                padding: 12px 16px 16px;
            }
            .auth-back-btn {
                top: 12px;
                right: 12px;
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ========================================================== -->
    <!-- صفحه ۱: لودینگ -->
    <!-- ========================================================== -->
    <div id="loadingScreen">
        <div class="loader-ring"></div>
        <div class="loading-text">SEEDRAN</div>
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- ========================================================== -->
    <!-- صفحه ۲: معرفی -->
    <!-- ========================================================== -->
    <div id="introScreen">
        <div class="intro-card">
            <div class="intro-icon">
                <i class="fas fa-brain"></i>
            </div>
            <h2 class="intro-title">به <span style="color:#667eea;">Seedran</span> خوش آمدید</h2>
            <p class="intro-desc">
                <span>✦</span> هوش مصنوعی پیشرفته با قابلیت‌های بین‌هایت<br />
                <span>✦</span> پاسخ‌های دقیق و طبیعی به زبان فارسی<br />
                <span>✦</span> حفظ حریم خصوصی و امنیت کامل<br />
                <span>✦</span> دسترسی رایگان برای همه کاربران
            </p>
            <div class="intro-buttons">
                <button class="btn-glow btn-glow-secondary" onclick="window.open('https://ble.ir/Fileuploader','_blank')">
                    <i class="fas fa-users ml-2"></i> عضویت در کانال
                </button>
                <button class="btn-glow btn-glow-primary" onclick="goToAuth()">
                    <i class="fas fa-rocket ml-2"></i> شروع کنید
                </button>
            </div>
        </div>
    </div>

    <!-- ========================================================== -->
    <!-- صفحه ۳: ثبت‌نام / ورود (با دکمه انصراف) -->
    <!-- ========================================================== -->
    <div id="authScreen">
        <div class="auth-card">
            <!-- دکمه انصراف (بازگشت به صفحه معرفی) -->
            <button class="auth-back-btn" onclick="goBackToIntro()" title="بازگشت">
                <i class="fas fa-arrow-right"></i>
            </button>

            <h1 class="auth-title">SEEDRAN</h1>
            <div class="auth-typing" id="typingText"></div>

            <form id="authForm" autocomplete="off">
                <div class="space-y-4">
                    <input type="text" id="authUsername" class="auth-input" placeholder="نام کاربری" required />
                    <input type="password" id="authPassword" class="auth-input" placeholder="گذرواژه (حداقل ۸ کاراکتر)" required minlength="8" />
                </div>

                <button type="submit" id="authSubmitBtn" class="auth-btn mt-6">
                    <span id="authBtnText">ثبت‌نام</span>
                    <span id="authBtnSpinner" style="display:none;"><i class="fas fa-spinner fa-spin mr-2"></i></span>
                </button>
            </form>

            <div class="auth-toggle mt-4" id="authToggle">
                قبلاً ثبت‌نام کردید؟ <span style="color:#667eea;">ورود کنید</span>
            </div>

            <div id="authMessage" style="display:none;" class="mt-4 text-center text-sm p-3 rounded-xl"></div>
        </div>
    </div>

    <!-- ========================================================== -->
    <!-- صفحه ۴: چت -->
    <!-- ========================================================== -->
    <div id="chatScreen">
        <!-- هدر -->
        <div class="chat-header">
            <div class="chat-header-left">
                <span class="chat-header-logo">✦ Seedran</span>
                <div class="chat-header-status">
                    <span class="status-dot-online"></span>
                    <span>آنلاین</span>
                </div>
            </div>
            <div style="position:relative;">
                <div class="profile-btn" id="profileBtn" onclick="toggleProfileMenu()">
                    <span id="profileBtnText">S</span>
                </div>

                <!-- منوی پروفایل -->
                <div class="profile-menu" id="profileMenu">
                    <div class="profile-menu-item" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-camera"></i> انتخاب عکس پروفایل
                    </div>
                    <div class="profile-menu-item" onclick="changeUsername()">
                        <i class="fas fa-user-edit"></i> تغییر اسم
                    </div>
                    <div class="profile-menu-item" onclick="showStats()">
                        <i class="fas fa-chart-bar"></i> آمار مصرف
                    </div>
                    <div class="profile-menu-item danger" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> خروج از اکانت
                    </div>
                </div>
            </div>
        </div>

        <!-- بدنه چت -->
        <div class="chat-body" id="chatBody">
            <!-- پیام‌ها اینجا می‌آیند -->
        </div>

        <!-- فوتر چت -->
        <div class="chat-footer">
            <div class="chat-input-wrapper">
                <textarea class="chat-input" id="chatInput" placeholder="پیام خود را بنویسید..." rows="1"></textarea>
                <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- فایل مخفی برای آپلود عکس -->
    <input type="file" id="fileInput" accept="image/*" onchange="uploadProfilePic(event)" />

    <!-- ========================================================== -->
    <!-- جاوااسکریپت کامل -->
    <!-- ========================================================== -->
    <script>
        (function() {
            'use strict';

            // =============================================
            // ۱. المان‌ها
            // =============================================
            const loadingScreen = document.getElementById('loadingScreen');
            const introScreen = document.getElementById('introScreen');
            const authScreen = document.getElementById('authScreen');
            const chatScreen = document.getElementById('chatScreen');

            const typingText = document.getElementById('typingText');
            const authForm = document.getElementById('authForm');
            const authUsername = document.getElementById('authUsername');
            const authPassword = document.getElementById('authPassword');
            const authToggle = document.getElementById('authToggle');
            const authBtnText = document.getElementById('authBtnText');
            const authBtnSpinner = document.getElementById('authBtnSpinner');
            const authSubmitBtn = document.getElementById('authSubmitBtn');
            const authMessage = document.getElementById('authMessage');

            const chatBody = document.getElementById('chatBody');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const profileBtnText = document.getElementById('profileBtnText');

            let isLoginMode = false;
            let currentUser = null;
            let typingInterval = null;
            let isProcessing = false;

            // =============================================
            // ۲. CSRF Token (امنیت)
            // =============================================
            function generateCSRFToken() {
                const array = new Uint8Array(32);
                crypto.getRandomValues(array);
                return Array.from(array, b => b.toString(16).padStart(2, '0')).join('');
            }

            let csrfToken = sessionStorage.getItem('csrf_token');
            if (!csrfToken) {
                csrfToken = generateCSRFToken();
                sessionStorage.setItem('csrf_token', csrfToken);
            }

            // =============================================
            // ۳. هش کردن
            // =============================================
            function hashSHA256(text) {
                return CryptoJS.SHA256(text).toString(CryptoJS.enc.Hex);
            }

            function generateNonce() {
                return Date.now().toString(36) + Math.random().toString(36).substring(2, 8);
            }

            // =============================================
            // ۴. مدیریت لودینگ
            // =============================================
            setTimeout(() => {
                loadingScreen.classList.add('hide');
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    introScreen.classList.add('active');
                }, 800);
            }, 3000);

            // =============================================
            // ۵. تایپینگ متن در صفحه ثبت‌نام
            // =============================================
            const phrases = [
                'هوش مصنوعی <span>پیشرفته</span>',
                'پاسخ‌های <span>دقیق</span> و <span>طبیعی</span>',
                'امنیت و <span>حریم خصوصی</span>',
                'رایگان برای <span>همه</span>'
            ];
            let phraseIndex = 0;
            let charIndex = 0;
            let isDeleting = false;

            function typeEffect() {
                const current = phrases[phraseIndex];
                if (isDeleting) {
                    typingText.innerHTML = current.substring(0, charIndex--);
                    if (charIndex < 0) {
                        isDeleting = false;
                        phraseIndex = (phraseIndex + 1) % phrases.length;
                        setTimeout(typeEffect, 500);
                        return;
                    }
                    setTimeout(typeEffect, 40);
                } else {
                    typingText.innerHTML = current.substring(0, charIndex++);
                    if (charIndex > current.length) {
                        isDeleting = true;
                        setTimeout(typeEffect, 2000);
                        return;
                    }
                    setTimeout(typeEffect, 80);
                }
            }

            setTimeout(typeEffect, 500);

            // =============================================
            // ۶. رفتن به صفحه ثبت‌نام
            // =============================================
            window.goToAuth = function() {
                introScreen.classList.remove('active');
                authScreen.classList.add('active');
            };

            // =============================================
            // ۷. برگشت به صفحه معرفی (دکمه انصراف)
            // =============================================
            window.goBackToIntro = function() {
                authScreen.classList.remove('active');
                introScreen.classList.add('active');
                // پاک کردن فرم و پیام‌ها
                authForm.reset();
                authMessage.style.display = 'none';
                // ریست حالت به ثبت‌نام
                isLoginMode = false;
                authBtnText.textContent = 'ثبت‌نام';
                authToggle.innerHTML = 'قبلاً ثبت‌نام کردید؟ <span style="color:#667eea;">ورود کنید</span>';
            };

            // =============================================
            // ۸. تغییر حالت ورود/ثبت‌نام
            // =============================================
            authToggle.addEventListener('click', function() {
                isLoginMode = !isLoginMode;
                authBtnText.textContent = isLoginMode ? 'ورود' : 'ثبت‌نام';
                authToggle.innerHTML = isLoginMode ?
                    'حساب کاربری ندارید؟ <span style="color:#667eea;">ثبت‌نام کنید</span>' :
                    'قبلاً ثبت‌نام کردید؟ <span style="color:#667eea;">ورود کنید</span>';
                authMessage.style.display = 'none';
            });

            // =============================================
            // ۹. ارسال فرم ثبت‌نام/ورود
            // =============================================
            authForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const username = authUsername.value.trim();
                const password = authPassword.value;

                if (!username || username.length < 3) {
                    showAuthMessage('نام کاربری حداقل ۳ کاراکتر باشد', 'error');
                    return;
                }
                if (password.length < 8) {
                    showAuthMessage('گذرواژه حداقل ۸ کاراکتر باشد', 'error');
                    return;
                }

                authSubmitBtn.disabled = true;
                authBtnText.style.display = 'none';
                authBtnSpinner.style.display = 'inline';

                try {
                    const hashedPassword = hashSHA256(password + username);
                    const nonce = generateNonce();

                    const payload = {
                        mode: isLoginMode ? 'login' : 'signup',
                        username: username,
                        passwordHash: hashedPassword,
                        csrfToken: csrfToken,
                        nonce: nonce,
                        timestamp: Date.now()
                    };

                    const response = await fetch('/api/auth', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRF-Token': csrfToken,
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        showAuthMessage(result.message || 'موفقیت‌آمیز!', 'success');
                        currentUser = {
                            username: username,
                            name: username,
                            email: username + '@seedran.ai'
                        };
                        sessionStorage.setItem('user', JSON.stringify(currentUser));
                        if (result.sessionToken) {
                            sessionStorage.setItem('session_token', result.sessionToken);
                        }

                        setTimeout(() => {
                            enterChat();
                        }, 800);
                    } else {
                        showAuthMessage(result.message || 'خطا در ارتباط با سرور', 'error');
                    }
                } catch (error) {
                    showAuthMessage('خطای ناشناخته، دوباره تلاش کنید', 'error');
                } finally {
                    authSubmitBtn.disabled = false;
                    authBtnText.style.display = 'inline';
                    authBtnSpinner.style.display = 'none';
                }
            });

            function showAuthMessage(text, type) {
                authMessage.textContent = text;
                authMessage.className = 'mt-4 text-center text-sm p-3 rounded-xl ' +
                    (type === 'success' ? 'bg-emerald-500/10 border border-emerald-500/20 text-emerald-400' :
                        'bg-red-500/10 border border-red-500/20 text-red-400');
                authMessage.style.display = 'block';
                setTimeout(() => { authMessage.style.display = 'none'; }, 5000);
            }

            // =============================================
            // ۱۰. ورود به چت
            // =============================================
            function enterChat() {
                authScreen.classList.remove('active');
                chatScreen.classList.add('active');
                profileBtnText.textContent = currentUser.name.charAt(0).toUpperCase();

                // پیام خوش‌آمدگویی
                addMessage('ai', 'سلام! 👋 من Seedran هستم. چطور می‌توانم به شما کمک کنم؟');
            }

            // =============================================
            // ۱۱. مدیریت چت
            // =============================================
            function addMessage(type, text) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${type}`;

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';

                // چک کردن عکس پروفایل
                const savedPic = sessionStorage.getItem('profile_pic');
                if (type === 'user' && savedPic) {
                    const img = document.createElement('img');
                    img.src = savedPic;
                    avatar.appendChild(img);
                } else if (type === 'user') {
                    avatar.textContent = currentUser ? currentUser.name.charAt(0).toUpperCase() : 'U';
                } else {
                    avatar.innerHTML = '<i class="fas fa-brain"></i>';
                }

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.textContent = text;

                msgDiv.appendChild(avatar);
                msgDiv.appendChild(bubble);
                chatBody.appendChild(msgDiv);
                chatBody.scrollTop = chatBody.scrollHeight;
            }

            function addTypingIndicator() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message-typing';
                typingDiv.id = 'typingIndicator';

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.innerHTML = '<i class="fas fa-brain"></i>';

                const dots = document.createElement('div');
                dots.className = 'typing-dots';
                for (let i = 0; i < 3; i++) {
                    const span = document.createElement('span');
                    dots.appendChild(span);
                }

                typingDiv.appendChild(avatar);
                typingDiv.appendChild(dots);
                chatBody.appendChild(typingDiv);
                chatBody.scrollTop = chatBody.scrollHeight;
            }

            function removeTypingIndicator() {
                const indicator = document.getElementById('typingIndicator');
                if (indicator) indicator.remove();
            }

            // =============================================
            // ۱۲. ارسال پیام
            // =============================================
            window.sendMessage = async function() {
                const text = chatInput.value.trim();
                if (!text || isProcessing) return;

                // اضافه کردن پیام کاربر
                addMessage('user', text);
                chatInput.value = '';
                chatInput.style.height = 'auto';
                isProcessing = true;
                sendBtn.disabled = true;

                // نشانگر تایپ
                addTypingIndicator();

                try {
                    // ارسال به Worker
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRF-Token': csrfToken
                        },
                        body: JSON.stringify({
                            message: text,
                            username: currentUser ? currentUser.username : 'guest',
                            sessionToken: sessionStorage.getItem('session_token')
                        })
                    });

                    const result = await response.json();

                    removeTypingIndicator();

                    if (response.ok && result.success) {
                        addMessage('ai', result.reply || 'پاسخ دریافت شد!');
                    } else {
                        addMessage('ai', 'متأسفم، خطایی رخ داد. لطفاً دوباره تلاش کنید.');
                    }
                } catch (error) {
                    removeTypingIndicator();
                    addMessage('ai', 'خطا در ارتباط با سرور. لطفاً دوباره تلاش کنید.');
                } finally {
                    isProcessing = false;
                    sendBtn.disabled = false;
                    chatInput.focus();
                }
            };

            // Enter برای ارسال
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Auto-resize textarea
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            // =============================================
            // ۱۳. منوی پروفایل
            // =============================================
            window.toggleProfileMenu = function() {
                const menu = document.getElementById('profileMenu');
                menu.classList.toggle('active');
            };

            // بستن منو با کلیک بیرون
            document.addEventListener('click', function(e) {
                const menu = document.getElementById('profileMenu');
                const btn = document.getElementById('profileBtn');
                if (!menu.contains(e.target) && !btn.contains(e.target)) {
                    menu.classList.remove('active');
                }
            });

            // =============================================
            // ۱۴. آپلود عکس پروفایل
            // =============================================
            window.uploadProfilePic = function(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgData = e.target.result;
                    sessionStorage.setItem('profile_pic', imgData);

                    // به‌روزرسانی آواتارها
                    document.querySelectorAll('.message-avatar').forEach(el => {
                        if (el.parentElement?.classList?.contains('user')) {
                            el.innerHTML = '';
                            const img = document.createElement('img');
                            img.src = imgData;
                            el.appendChild(img);
                        }
                    });

                    // به‌روزرسانی دکمه پروفایل
                    const btn = document.getElementById('profileBtnText');
                    btn.innerHTML = '';
                    const img = document.createElement('img');
                    img.src = imgData;
                    btn.appendChild(img);

                    showAuthMessage('عکس پروفایل با موفقیت آپلود شد!', 'success');
                };
                reader.readAsDataURL(file);
                document.getElementById('profileMenu').classList.remove('active');
            };

            // =============================================
            // ۱۵. تغییر اسم
            // =============================================
            window.changeUsername = function() {
                const newName = prompt('اسم جدید خود را وارد کنید:', currentUser?.name || '');
                if (newName && newName.trim().length >= 2) {
                    currentUser.name = newName.trim();
                    sessionStorage.setItem('user', JSON.stringify(currentUser));
                    profileBtnText.textContent = newName.trim().charAt(0).toUpperCase();
                    document.getElementById('profileMenu').classList.remove('active');
                    showAuthMessage('اسم با موفقیت تغییر کرد!', 'success');
                }
            };

            // =============================================
            // ۱۶. آمار مصرف
            // =============================================
            window.showStats = function() {
                const msgs = document.querySelectorAll('.message').length;
                alert(`📊 آمار مصرف شما:\n\nپیام‌های ارسال شده: ${msgs}\nوضعیت: فعال\nنسخه: Beta 2.0`);
                document.getElementById('profileMenu').classList.remove('active');
            };

            // =============================================
            // ۱۷. خروج
            // =============================================
            window.logout = function() {
                if (confirm('مطمئن هستید می‌خواهید خارج شوید؟')) {
                    sessionStorage.removeItem('user');
                    sessionStorage.removeItem('session_token');
                    sessionStorage.removeItem('profile_pic');
                    chatScreen.classList.remove('active');
                    authScreen.classList.add('active');
                    chatBody.innerHTML = '';
                    document.getElementById('profileMenu').classList.remove('active');
                    isLoginMode = false;
                    authBtnText.textContent = 'ثبت‌نام';
                    authToggle.innerHTML = 'قبلاً ثبت‌نام کردید؟ <span style="color:#667eea;">ورود کنید</span>';
                }
            };

            // =============================================
            // ۱۸. چک کردن لاگین قبلی
            // =============================================
            const savedUser = sessionStorage.getItem('user');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    const savedPic = sessionStorage.getItem('profile_pic');
                    if (savedPic) {
                        profileBtnText.innerHTML = `<img src="${savedPic}" />`;
                    } else {
                        profileBtnText.textContent = currentUser.name.charAt(0).toUpperCase();
                    }
                    // نمایش صفحه چت مستقیم
                    loadingScreen.style.display = 'none';
                    introScreen.style.display = 'none';
                    authScreen.style.display = 'none';
                    chatScreen.classList.add('active');
                    addMessage('ai', 'سلام! 👋 خوش برگشتی ' + currentUser.name + '. چطور می‌توانم کمک کنم؟');
                } catch (e) {}
            }

            console.log('✅ Seedran v3.1 Loaded | CSRF:', csrfToken.substring(0, 8) + '...');

        })();
    </script>

</body>
